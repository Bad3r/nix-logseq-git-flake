[global]
tree-root-file = "flake.nix"
excludes = [
  "*.lock",
  "*.patch",
  "package-lock.json",
  "go.mod",
  "go.sum",
  ".gitmodules",
  ".hgignore",
  ".svnignore",
]
on-unmatched = "warn"

[formatter.nixfmt]
command = "nixfmt"
includes = ["*.nix"]

[formatter.dprint]
command = "dprint"
includes = [
  "*.json",
  "*.jsonc",
  "*.md",
  "*.markdown",
  "*.toml",
  "*.yaml",
  "*.yml",
  "*.xml",
]
excludes = [
  ".github/workflows/**",
]
options = ["fmt"]

[formatter.shfmt]
command = "shfmt"
includes = ["*.sh", "*.bash", "*.envrc", "*.envrc.*"]
options = ["-s", "-w", "-i", "2"]
