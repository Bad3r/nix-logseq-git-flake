# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Validate Flake

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
  workflow_dispatch:

concurrency:
  group: validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            fallback = true

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: nix-logseq-git-flake
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          installCommand: nix profile install --inputs-from "$GITHUB_WORKSPACE" nixpkgs#cachix

      - name: Check formatting
        run: nix fmt -- --ci

      # nix flake check caches only check markers, not these intermediate FODs.
      # Build them explicitly so Cachix uploads them: aarch64 jobs substitute
      # these architecture-independent paths instead of rebuilding them.
      - name: Seed CLI fixed-output derivations for aarch64 substitution
        run: |
          nix build --accept-flake-config --print-build-logs \
            .#logseq-cli.cliCljDeps \
            .#logseq-cli.cliPnpmDeps

  validate-x86_64-linux:
    runs-on: ubuntu-24.04
    needs: validate
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            fallback = true

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: nix-logseq-git-flake
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          installCommand: nix profile install --inputs-from "$GITHUB_WORKSPACE" nixpkgs#cachix

      - name: Run nix flake check (x86_64-linux)
        run: nix flake check

  validate-aarch64:
    runs-on: ubuntu-24.04-arm
    needs: validate
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            fallback = true

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: nix-logseq-git-flake
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          installCommand: nix profile install --inputs-from "$GITHUB_WORKSPACE" nixpkgs#cachix

      - name: Build and smoke-test logseq-cli (aarch64)
        run: |
          nix build --accept-flake-config --print-build-logs .#packages.aarch64-linux.logseq-cli
          nix build --accept-flake-config --print-build-logs .#checks.aarch64-linux.logseq-cli-help

      - name: Detect aarch64 desktop asset readiness
        id: asset
        run: |
          set -euo pipefail
          sha="$(jq -r '.assets["aarch64-linux"].sha256' data/logseq-nightly.json)"
          placeholder="sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          if [ "$sha" = "$placeholder" ]; then
            echo "ready=false" >>"$GITHUB_OUTPUT"
            echo "::warning::aarch64 desktop asset is still a placeholder; skipping desktop build until the nightly publishes logseq-linux-arm64-*.tar.gz."
          else
            echo "ready=true" >>"$GITHUB_OUTPUT"
          fi

      - name: Build and smoke-test logseq desktop (aarch64)
        if: steps.asset.outputs.ready == 'true'
        run: |
          nix build --accept-flake-config --print-build-logs .#packages.aarch64-linux.logseq
          nix build --accept-flake-config --print-build-logs .#checks.aarch64-linux.logseq

  validate-aarch64-darwin:
    runs-on: macos-26
    needs: validate
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            fallback = true

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: nix-logseq-git-flake
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          installCommand: nix profile install --inputs-from "$GITHUB_WORKSPACE" nixpkgs#cachix

      - name: Build and smoke-test logseq-cli (aarch64-darwin)
        run: |
          nix build --accept-flake-config --print-build-logs .#packages.aarch64-darwin.logseq-cli
          nix build --accept-flake-config --print-build-logs .#checks.aarch64-darwin.logseq-cli-help

      - name: Detect aarch64-darwin desktop asset readiness
        id: asset
        run: |
          set -euo pipefail
          sha="$(jq -r '.assets["aarch64-darwin"].sha256' data/logseq-nightly.json)"
          placeholder="sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          if [ "$sha" = "$placeholder" ]; then
            echo "ready=false" >>"$GITHUB_OUTPUT"
            echo "::warning::aarch64-darwin desktop asset is still a placeholder; skipping desktop build until the nightly publishes logseq-darwin-arm64-*.tar.gz."
          else
            echo "ready=true" >>"$GITHUB_OUTPUT"
          fi

      - name: Build and smoke-test logseq desktop (aarch64-darwin)
        if: steps.asset.outputs.ready == 'true'
        run: |
          nix build --accept-flake-config --print-build-logs .#packages.aarch64-darwin.logseq
          nix build --accept-flake-config --print-build-logs .#checks.aarch64-darwin.logseq
          nix build --accept-flake-config --print-build-logs .#checks.aarch64-darwin.logseq-runtime-assets

      - name: Verify and launch Logseq.app (aarch64-darwin)
        if: steps.asset.outputs.ready == 'true'
        run: |
          set -euo pipefail
          app="$(nix path-info --accept-flake-config .#packages.aarch64-darwin.logseq)/Applications/Logseq.app"
          codesign --verify --deep --strict "$app"
          log="$RUNNER_TEMP/logseq-darwin-launch.log"
          "$app/Contents/MacOS/Logseq" --disable-gpu >"$log" 2>&1 &
          pid=$!
          sleep 20
          if kill -0 "$pid" 2>/dev/null; then
            kill "$pid"
            set +e
            wait "$pid" 2>/dev/null
            set -e
            exit 0
          fi
          status=0
          wait "$pid" || status=$?
          if [ "$status" -ne 0 ]; then
            echo "Logseq launch probe exited $status" >&2
            cat "$log" >&2
            exit "$status"
          fi

  audit-flake-inputs:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Check Nix flake Nixpkgs inputs
        id: flake-checker-attempt-1
        uses: DeterminateSystems/flake-checker-action@v12
        continue-on-error: true
        with:
          send-statistics: false
          fail-mode: true
          check-outdated: true
          check-owner: true
          check-supported: true

      - name: Wait before flake checker retry
        if: steps.flake-checker-attempt-1.outcome == 'failure'
        run: sleep 5

      - name: Check Nix flake Nixpkgs inputs retry
        if: steps.flake-checker-attempt-1.outcome == 'failure'
        id: flake-checker-attempt-2
        uses: DeterminateSystems/flake-checker-action@v12
        continue-on-error: true
        with:
          send-statistics: false
          fail-mode: true
          check-outdated: true
          check-owner: true
          check-supported: true

      - name: Wait before final flake checker retry
        if: steps.flake-checker-attempt-2.outcome == 'failure'
        run: sleep 15

      - name: Check Nix flake Nixpkgs inputs final retry
        if: steps.flake-checker-attempt-2.outcome == 'failure'
        uses: DeterminateSystems/flake-checker-action@v12
        with:
          send-statistics: false
          fail-mode: true
          check-outdated: true
          check-owner: true
          check-supported: true

  sensitive-change-policy:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Detect sensitive changes
        id: detect
        uses: ./.github/actions/detect-sensitive-changes

      - name: Enforce security review label for sensitive changes
        if: steps.detect.outputs.sensitive == 'true'
        uses: actions/github-script@v9
        env:
          MATCHED_FILES: ${{ steps.detect.outputs.files }}
        with:
          script: |
            const requiredLabel = "status(security-review-approved)";
            // Owners, org members, and collaborators are trusted to change
            // sensitive paths without the label. author_association is computed
            // by GitHub and cannot be set by the PR author.
            const trusted = new Set(["OWNER", "MEMBER", "COLLABORATOR"]);
            const assoc = context.payload.pull_request.author_association;
            if (trusted.has(assoc)) {
              core.info(
                `Author association '${assoc}' is trusted; ` +
                  `'${requiredLabel}' not required.`
              );
              return;
            }
            const labels = (context.payload.pull_request.labels || []).map(
              (label) => label.name
            );
            if (labels.includes(requiredLabel)) {
              return;
            }
            const changed = process.env.MATCHED_FILES;
            core.setFailed(
              [
                `Sensitive file changes detected:\n${changed}`,
                `Missing required label: ${requiredLabel}`,
                `Author association '${assoc}' is not owner/member/collaborator.`,
                "A maintainer must review the changes and add the label before merge."
              ].join("\n\n")
            );
