name: Build Desktop (reusable)

# Reusable build pipeline shared by nightly.yml (real release) and
# test-build.yml (isolated test release). Compiles upstream Logseq and packages
# the per-system desktop tarballs + metadata as artifacts. Callers consume the
# artifacts (meta.txt, hash-*.txt, tarballs, release-notes.md) via gh run download.
on:
  workflow_call:
    inputs:
      logseq_branch:
        description: "Logseq branch to build (legacy alias; ignored when logseq_ref is set)"
        required: false
        type: string
        default: master
      logseq_repo:
        description: "GitHub repository (owner/repo) to build from"
        required: false
        type: string
        default: logseq/logseq
      logseq_ref:
        description: "Branch, tag, 40-char SHA, or refs/pull/N/head; wins over logseq_branch when non-empty"
        required: false
        type: string
        default: ""
      build_x86_64_linux:
        description: "Build the x86_64-linux matrix leg"
        required: false
        type: boolean
        default: true
      build_aarch64_linux:
        description: "Build the aarch64-linux matrix leg"
        required: false
        type: boolean
        default: true
      build_aarch64_darwin:
        description: "Build the aarch64-darwin matrix leg"
        required: false
        type: boolean
        default: true
      apply_patches:
        description: "Apply patches/logseq-*.patch to the cloned source (rev-pinned fixes for the nightly rev)"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.33.0"
  JAVA_VERSION: "21"
  CLOJURE_VERSION: "1.12.4.1618"

jobs:
  resolve-revision:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      rev: ${{ steps.resolve.outputs.rev }}
      repo: ${{ steps.resolve.outputs.repo }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Resolve source revision
        id: resolve
        env:
          LOGSEQ_REPO: ${{ inputs.logseq_repo }}
          LOGSEQ_REF: ${{ inputs.logseq_ref != '' && inputs.logseq_ref || inputs.logseq_branch }}
        run: |
          set -euo pipefail
          # Reject anything that could turn into an arbitrary clone URL.
          if [[ ! "$LOGSEQ_REPO" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "logseq_repo must be OWNER/REPO, got: $LOGSEQ_REPO" >&2
            exit 1
          fi
          if [[ "$LOGSEQ_REF" =~ ^[0-9a-f]{40}$ ]]; then
            rev="$LOGSEQ_REF"
          else
            remote="https://github.com/${LOGSEQ_REPO}.git"
            rev=""
            # Order matters: branch wins over tag; X^{} peels annotated tags to
            # the commit; the literal pattern covers refs/pull/N/head.
            # A ref absent as a branch falls through to tags, then the literal
            # (so a mistyped branch name that matches a tag resolves to the tag).
            for pattern in "refs/heads/${LOGSEQ_REF}" "refs/tags/${LOGSEQ_REF}^{}" "refs/tags/${LOGSEQ_REF}" "$LOGSEQ_REF"; do
              rev="$(git ls-remote "$remote" "$pattern" | head -1 | cut -f1)"
              if [ -n "$rev" ]; then break; fi
            done
          fi
          if [[ ! "$rev" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Could not resolve '${LOGSEQ_REF}' on ${LOGSEQ_REPO}" >&2
            exit 1
          fi
          echo "rev=${rev}" >>"$GITHUB_OUTPUT"
          echo "repo=${LOGSEQ_REPO}" >>"$GITHUB_OUTPUT"

      - name: Select build matrix
        id: matrix
        env:
          BUILD_X86_64_LINUX: ${{ inputs.build_x86_64_linux }}
          BUILD_AARCH64_LINUX: ${{ inputs.build_aarch64_linux }}
          BUILD_AARCH64_DARWIN: ${{ inputs.build_aarch64_darwin }}
        run: |
          set -euo pipefail
          matrix="$(jq -cn \
            --argjson x64 "$BUILD_X86_64_LINUX" \
            --argjson arm64 "$BUILD_AARCH64_LINUX" \
            --argjson darwin "$BUILD_AARCH64_DARWIN" \
            '[
              if $x64 then {
                os: "linux",
                arch: "x64",
                runner: "ubuntu-24.04",
                nix_system: "x86_64-linux"
              } else empty end,
              if $arm64 then {
                os: "linux",
                arch: "arm64",
                runner: "ubuntu-24.04-arm",
                nix_system: "aarch64-linux"
              } else empty end,
              if $darwin then {
                os: "darwin",
                arch: "arm64",
                runner: "macos-26",
                nix_system: "aarch64-darwin"
              } else empty end
            ] as $include
            | if ($include | length) == 0 then
                error("at least one build system must be selected")
              else
                {include: $include}
              end')"
          echo "matrix=${matrix}" >>"$GITHUB_OUTPUT"

  build:
    needs: resolve-revision
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve-revision.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Clone Logseq source
        env:
          LOGSEQ_REPO: ${{ needs.resolve-revision.outputs.repo }}
          LOGSEQ_REV: ${{ needs.resolve-revision.outputs.rev }}
        run: |
          set -euo pipefail
          git init -q logseq-src
          cd logseq-src
          git remote add origin "https://github.com/${LOGSEQ_REPO}.git"
          git fetch -q --depth 1 origin "${LOGSEQ_REV}"
          git checkout -q FETCH_HEAD

      # Temporary upstream fixes tracked under patches/; each patch header
      # documents the bug and its removal condition. Strict apply fails the
      # build when upstream drifts or lands the fix, which is the signal to
      # update or drop the patch file.
      - name: Apply upstream patches
        if: ${{ inputs.apply_patches }}
        working-directory: logseq-src
        run: |
          set -euo pipefail
          applied=0
          for patch in ../patches/logseq-*.patch; do
            [ -e "$patch" ] || continue
            git apply --verbose "$patch"
            applied=$((applied + 1))
          done
          echo "Applied ${applied} upstream patch(es)"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory path
        id: pnpm-store-dir-path
        run: echo "dir=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store directory
        id: pnpm-cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store-dir-path.outputs.dir }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-pnpm-

      - name: Cache Electron downloads
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-${{ runner.arch }}-electron-${{ hashFiles('logseq-src/resources/package.json', 'logseq-src/resources/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-electron-

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Clojure deps
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-${{ runner.arch }}-clojure-${{ hashFiles('logseq-src/**/deps.edn') }}

      - name: Setup Clojure CLI
        uses: DeLaGuardo/setup-clojure@13
        with:
          cli: ${{ env.CLOJURE_VERSION }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      # The CLI front-end is OCaml compiled via Melange since logseq/logseq
      # dbd220c95d (https://github.com/logseq/logseq/commit/dbd220c95d);
      # `pnpm cli:release` runs `dune build @bundle` and needs the opam dependency
      # closure plus cli/'s own pnpm workspace (vite + transit-js). Mirrors
      # upstream build-desktop-release.yml dcfdfbf78e
      # (https://github.com/logseq/logseq/commit/dcfdfbf78e).
      - name: Setup OCaml toolchain from Nix
        run: |
          set -euo pipefail
          nix profile install --inputs-from "$GITHUB_WORKSPACE" \
            nixpkgs#opam nixpkgs#ocaml
          printf '%s\n' "$HOME/.nix-profile/bin" >>"$GITHUB_PATH"
          export PATH="$HOME/.nix-profile/bin:$PATH"
          opam init --bare --disable-sandboxing --yes --no-setup
          opam switch create default ocaml-system --yes
          opam --version
          ocaml -version

      - name: Fetch OCaml deps
        working-directory: logseq-src/cli
        run: opam install . --deps-only --with-test --yes

      - name: Fetch CLI pnpm deps
        working-directory: logseq-src
        run: pnpm --dir cli install --frozen-lockfile

      - name: Setup Python
        if: matrix.os == 'darwin'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Determine nightly version
        id: version
        run: |
          set -euo pipefail
          value="$(node ./scripts/get-pkg-version.js nightly | tr -d '\r\n')"
          [[ "$value" =~ ^[A-Za-z0-9._+-]+$ ]] || { echo "Invalid version characters: $value" >&2; exit 1; }
          echo "value=${value}" >>"$GITHUB_OUTPUT"
        working-directory: logseq-src

      - name: Update Nightly APP Version
        env:
          NIGHTLY_VERSION: ${{ steps.version.outputs.value }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = "src/main/frontend/version.cljs";
          const source = fs.readFileSync(path, "utf8");
          const next = source.replace(
            /defonce version ".*"/,
            `defonce version "${process.env.NIGHTLY_VERSION}"`
          );
          if (next === source) {
            throw new Error(`expected to patch Logseq version in ${path}`);
          }
          fs.writeFileSync(path, next);
          NODE
        working-directory: logseq-src

      - name: Disable bundled desktop CLI launcher
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path("src/electron/electron/core.cljs")
          source = path.read_text()
          lines = source.splitlines(keepends=True)
          patched_lines = [
              line for line in lines
              if line.strip() != "(install-cli-launcher!)"
          ]
          removed = len(lines) - len(patched_lines)
          if removed != 1:
              raise SystemExit(f"expected exactly one desktop CLI launcher install call, got {removed}")
          patched = "".join(patched_lines)
          path.write_text(patched)
          PY
        working-directory: logseq-src

      - name: Compile Logseq assets
        working-directory: logseq-src
        env:
          LOGSEQ_SENTRY_DSN: ""
          LOGSEQ_POSTHOG_TOKEN: ""
        run: |
          pnpm install --frozen-lockfile
          pnpm gulp:build
          pnpm cljs:release-electron
          pnpm db-worker-node:bundle
          opam exec -- pnpm cli:release
          pnpm webpack-app-build
          pnpm desktop:prepare-runtime-js

      - name: Verify bundled db-worker-node runtime
        working-directory: logseq-src
        run: |
          test -f ./dist/db-worker-node.js
          test -f ./dist/db-worker-node-assets.json

      - name: Verify desktop runtime script locations
        working-directory: logseq-src
        run: |
          test -f ./static/js/db-worker-node.js
          test -f ./static/js/logseq-cli.js
          test -f ./static/.agents/skills/logseq-cli/SKILL.md

      - name: Update APP Version
        env:
          NIGHTLY_VERSION: ${{ steps.version.outputs.value }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = "package.json";
          const metadata = JSON.parse(fs.readFileSync(path, "utf8"));
          metadata.version = process.env.NIGHTLY_VERSION;
          fs.writeFileSync(path, `${JSON.stringify(metadata, null, 2)}\n`);
          NODE
        working-directory: logseq-src/static

      - name: Save VERSION file
        env:
          NIGHTLY_VERSION: ${{ steps.version.outputs.value }}
        run: printf '%s\n' "$NIGHTLY_VERSION" >./VERSION
        working-directory: logseq-src/static

      - name: Verify Darwin Electron scripts
        if: matrix.os == 'darwin'
        working-directory: logseq-src/static
        run: |
          node <<'NODE'
          const fs = require("fs");
          const metadata = JSON.parse(fs.readFileSync("package.json", "utf8"));
          for (const script of ["rebuild:all", "electron:make-macos-arm64"]) {
            if (!metadata.scripts || !metadata.scripts[script]) {
              throw new Error(`expected static/package.json to define ${script}`);
            }
          }
          NODE

      - name: Prepare Electron package
        working-directory: logseq-src/static
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          LOGSEQ_SENTRY_DSN: ""
          LOGSEQ_POSTHOG_TOKEN: ""
        run: |
          set -euo pipefail
          if [ "${{ matrix.os }}" = "darwin" ]; then
            pnpm install --frozen-lockfile \
              --config.supportedArchitectures.os=darwin \
              --config.supportedArchitectures.cpu=arm64
            pnpm rebuild:all
            package_command=(pnpm electron:make-macos-arm64)
          else
            pnpm install --frozen-lockfile
            package_command=(pnpm electron:make)
          fi
          for attempt in 1 2 3; do
            if "${package_command[@]}"; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            echo "electron:make attempt ${attempt} failed; retrying..." >&2
            sleep $((attempt * 20))
          done

      - name: Create tarball artifact
        working-directory: logseq-src/static
        env:
          NIGHTLY_VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail
          mkdir -p out
          version="$NIGHTLY_VERSION"
          case "${{ matrix.os }}:${{ matrix.arch }}" in
            linux:*)
              src_dir="$(find dist -maxdepth 1 -type d -name 'linux*-unpacked' | head -1)"
              if [ -z "$src_dir" ] || [ ! -d "$src_dir" ]; then
                echo "Could not locate packaged Logseq bundle under dist/linux*-unpacked" >&2
                find dist -maxdepth 2 -mindepth 1 -print >&2 || true
                exit 1
              fi
              arch="${{ matrix.arch }}"
              tarball="out/logseq-linux-${arch}-${version}.tar.gz"
              tar -C "$src_dir" -czf "$tarball" .
              hash_file="out/hash-${arch}.txt"
              ;;
            darwin:arm64)
              if [ ! -d dist/mac-arm64 ]; then
                echo "Could not locate packaged Darwin app directory under dist/mac-arm64" >&2
                find dist -maxdepth 3 -mindepth 1 -print >&2 || true
                exit 1
              fi
              app_count="$(find dist/mac-arm64 -maxdepth 1 -type d -name '*.app' | wc -l | tr -d ' ')"
              if [ "$app_count" != 1 ]; then
                echo "Expected exactly one packaged .app under dist/mac-arm64, got $app_count" >&2
                find dist -maxdepth 3 -mindepth 1 -print >&2 || true
                exit 1
              fi
              app_dir="$(find dist/mac-arm64 -maxdepth 1 -type d -name '*.app' -print -quit)"
              payload_dir="${RUNNER_TEMP}/darwin-arm64-payload"
              mkdir -p "$payload_dir"
              cp -PRp "$app_dir" "$payload_dir/Logseq.app"
              if command -v xattr >/dev/null 2>&1; then
                xattr -cr "$payload_dir/Logseq.app"
              fi
              /usr/bin/codesign --force --deep --sign - "$payload_dir/Logseq.app"
              /usr/bin/codesign --verify --deep --strict "$payload_dir/Logseq.app"
              tarball="out/logseq-darwin-arm64-${version}.tar.gz"
              COPYFILE_DISABLE=1 tar -C "$payload_dir" -czf "$tarball" .
              src_dir="$payload_dir"
              hash_file="out/hash-darwin-arm64.txt"
              ;;
            *)
              echo "Unsupported build matrix entry: ${{ matrix.os }}:${{ matrix.arch }}" >&2
              exit 1
              ;;
          esac
          printf '%s\n' "$version" >out/VERSION
          hash=$(nix hash path --type sha256 --sri "$src_dir")
          printf '%s\n' "$hash" >"$hash_file"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.os }}-build-${{ matrix.arch }}
          path: logseq-src/static/out/*
          if-no-files-found: error

  # metadata is a separate job so deselecting any arch leg (including x64)
  # cannot drop meta.txt or release-notes.md. Version and datestring are
  # recomputed here, so they can skew from per-leg tarball filenames across a
  # UTC midnight boundary; accepted because release URLs derive from actual
  # tarball basenames.
  metadata:
    needs: resolve-revision
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Clone source at resolved revision
        env:
          LOGSEQ_REPO: ${{ needs.resolve-revision.outputs.repo }}
          LOGSEQ_REV: ${{ needs.resolve-revision.outputs.rev }}
        run: |
          set -euo pipefail
          git init -q logseq-src
          cd logseq-src
          git remote add origin "https://github.com/${LOGSEQ_REPO}.git"
          git fetch -q --depth 1 origin "${LOGSEQ_REV}"
          git checkout -q FETCH_HEAD

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Write build metadata
        env:
          LOGSEQ_REV: ${{ needs.resolve-revision.outputs.rev }}
        run: |
          set -euo pipefail
          mkdir -p out
          version="$(cd logseq-src && node ./scripts/get-pkg-version.js nightly | tr -d '\r\n')"
          [[ "$version" =~ ^[A-Za-z0-9._+-]+$ ]] || { echo "Invalid version characters: $version" >&2; exit 1; }
          {
            echo "version=${version}"
            echo "revision=${LOGSEQ_REV}"
            echo "datestring=$(date -u +%Y%m%d)"
          } >out/meta.txt

      - name: Render release notes
        working-directory: logseq-src
        env:
          LOGSEQ_REV: ${{ needs.resolve-revision.outputs.rev }}
          UPSTREAM_REPO_URL: https://github.com/${{ needs.resolve-revision.outputs.repo }}
          MANIFEST_PATH: ${{ github.workspace }}/data/logseq-nightly.json
          OUTPUT_PATH: ${{ github.workspace }}/out/release-notes.md
        run: bash "${GITHUB_WORKSPACE}/scripts/render-nightly-release-notes.sh"

      - name: Upload metadata artifact
        uses: actions/upload-artifact@v6
        with:
          name: build-metadata
          path: out/*
          if-no-files-found: error
