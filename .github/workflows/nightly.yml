name: Nightly Build

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      logseq_branch:
        description: "Logseq branch to build"
        required: false
        default: master
      publish_release:
        description: "Publish release and commit manifest update"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  issues: write

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.33.0"
  JAVA_VERSION: "21"
  CLOJURE_VERSION: "1.12.4.1618"
  LOGSEQ_BRANCH: ${{ github.event.inputs.logseq_branch || 'master' }}

jobs:
  resolve-revision:
    runs-on: ubuntu-24.04
    outputs:
      rev: ${{ steps.resolve.outputs.rev }}
    steps:
      - name: Resolve upstream revision
        id: resolve
        run: |
          set -euo pipefail
          rev="$(git ls-remote https://github.com/logseq/logseq.git "refs/heads/${LOGSEQ_BRANCH}" | head -1 | cut -f1)"
          test -n "$rev" || { echo "Could not resolve refs/heads/${LOGSEQ_BRANCH}" >&2; exit 1; }
          echo "rev=${rev}" >>"$GITHUB_OUTPUT"

  build:
    needs: resolve-revision
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x64
            runner: ubuntu-24.04
            nix_system: x86_64-linux
            experimental: false
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            nix_system: aarch64-linux
            experimental: false
          - os: darwin
            arch: arm64
            runner: macos-14
            nix_system: aarch64-darwin
            experimental: false
    continue-on-error: ${{ matrix.experimental }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Clone Logseq source
        env:
          LOGSEQ_REV: ${{ needs.resolve-revision.outputs.rev }}
        run: |
          set -euo pipefail
          git init -q logseq-src
          cd logseq-src
          git remote add origin https://github.com/logseq/logseq.git
          git fetch -q --depth 1 origin "${LOGSEQ_REV}"
          git checkout -q FETCH_HEAD

      - name: Set nightly metadata
        id: metadata
        run: echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory path
        id: pnpm-store-dir-path
        run: echo "dir=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store directory
        id: pnpm-cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store-dir-path.outputs.dir }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-pnpm-

      - name: Cache Electron downloads
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-${{ runner.arch }}-electron-${{ hashFiles('logseq-src/resources/package.json', 'logseq-src/resources/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-electron-

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Clojure deps
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-${{ runner.arch }}-clojure-${{ hashFiles('logseq-src/**/deps.edn') }}

      - name: Setup Clojure CLI
        uses: DeLaGuardo/setup-clojure@13
        with:
          cli: ${{ env.CLOJURE_VERSION }}

      - name: Setup Python
        if: matrix.os == 'darwin'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Determine nightly version
        id: version
        run: echo "value=$(node ./scripts/get-pkg-version.js nightly)" >> "$GITHUB_OUTPUT"
        working-directory: logseq-src

      - name: Update Nightly APP Version
        env:
          NIGHTLY_VERSION: ${{ steps.version.outputs.value }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = "src/main/frontend/version.cljs";
          const source = fs.readFileSync(path, "utf8");
          const next = source.replace(
            /defonce version ".*"/,
            `defonce version "${process.env.NIGHTLY_VERSION}"`
          );
          if (next === source) {
            throw new Error(`expected to patch Logseq version in ${path}`);
          }
          fs.writeFileSync(path, next);
          NODE
        working-directory: logseq-src

      - name: Disable bundled desktop CLI launcher
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path("src/electron/electron/core.cljs")
          source = path.read_text()
          lines = source.splitlines(keepends=True)
          patched_lines = [
              line for line in lines
              if line.strip() != "(install-cli-launcher!)"
          ]
          removed = len(lines) - len(patched_lines)
          if removed != 1:
              raise SystemExit(f"expected exactly one desktop CLI launcher install call, got {removed}")
          patched = "".join(patched_lines)
          path.write_text(patched)
          PY
        working-directory: logseq-src

      - name: Record source revision
        id: revision
        run: echo "rev=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
        working-directory: logseq-src

      - name: Compile Logseq assets
        working-directory: logseq-src
        env:
          LOGSEQ_SENTRY_DSN: ""
          LOGSEQ_POSTHOG_TOKEN: ""
        run: |
          pnpm install --frozen-lockfile
          pnpm gulp:build
          pnpm cljs:release-electron
          pnpm db-worker-node:bundle
          pnpm webpack-app-build
          pnpm desktop:prepare-runtime-js

      - name: Verify bundled db-worker-node runtime
        working-directory: logseq-src
        run: |
          test -f ./dist/db-worker-node.js
          test -f ./dist/db-worker-node-assets.json

      - name: Verify desktop runtime script locations
        working-directory: logseq-src
        run: |
          test -f ./static/js/db-worker-node.js
          test -f ./static/js/logseq-cli.js

      - name: Update APP Version
        env:
          NIGHTLY_VERSION: ${{ steps.version.outputs.value }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = "package.json";
          const metadata = JSON.parse(fs.readFileSync(path, "utf8"));
          metadata.version = process.env.NIGHTLY_VERSION;
          fs.writeFileSync(path, `${JSON.stringify(metadata, null, 2)}\n`);
          NODE
        working-directory: logseq-src/static

      - name: Save VERSION file
        run: echo "${{ steps.version.outputs.value }}" > ./VERSION
        working-directory: logseq-src/static

      - name: Verify Darwin Electron scripts
        if: matrix.os == 'darwin'
        working-directory: logseq-src/static
        run: |
          node <<'NODE'
          const fs = require("fs");
          const metadata = JSON.parse(fs.readFileSync("package.json", "utf8"));
          for (const script of ["rebuild:all", "electron:make-macos-arm64"]) {
            if (!metadata.scripts || !metadata.scripts[script]) {
              throw new Error(`expected static/package.json to define ${script}`);
            }
          }
          NODE

      - name: Prepare Electron package
        working-directory: logseq-src/static
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          LOGSEQ_SENTRY_DSN: ""
          LOGSEQ_POSTHOG_TOKEN: ""
        run: |
          set -euo pipefail
          if [ "${{ matrix.os }}" = "darwin" ]; then
            pnpm install --frozen-lockfile \
              --config.supportedArchitectures.os=darwin \
              --config.supportedArchitectures.cpu=arm64
            pnpm rebuild:all
            package_command=(pnpm electron:make-macos-arm64)
          else
            pnpm install --frozen-lockfile
            package_command=(pnpm electron:make)
          fi
          for attempt in 1 2 3; do
            if "${package_command[@]}"; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            echo "electron:make attempt ${attempt} failed; retrying..." >&2
            sleep $((attempt * 20))
          done

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Create tarball artifact
        working-directory: logseq-src/static
        run: |
          set -euo pipefail
          mkdir -p out
          version="${{ steps.version.outputs.value }}"
          case "${{ matrix.os }}:${{ matrix.arch }}" in
            linux:*)
              src_dir="$(find dist -maxdepth 1 -type d -name 'linux*-unpacked' | head -1)"
              if [ -z "$src_dir" ] || [ ! -d "$src_dir" ]; then
                echo "Could not locate packaged Logseq bundle under dist/linux*-unpacked" >&2
                find dist -maxdepth 2 -mindepth 1 -print >&2 || true
                exit 1
              fi
              arch="${{ matrix.arch }}"
              tarball="out/logseq-linux-${arch}-${version}.tar.gz"
              tar -C "$src_dir" -czf "$tarball" .
              hash_file="out/hash-${arch}.txt"
              ;;
            darwin:arm64)
              if [ ! -d dist/mac-arm64 ]; then
                echo "Could not locate packaged Darwin app directory under dist/mac-arm64" >&2
                find dist -maxdepth 3 -mindepth 1 -print >&2 || true
                exit 1
              fi
              app_count="$(find dist/mac-arm64 -maxdepth 1 -type d -name '*.app' | wc -l | tr -d ' ')"
              if [ "$app_count" != 1 ]; then
                echo "Expected exactly one packaged .app under dist/mac-arm64, got $app_count" >&2
                find dist -maxdepth 3 -mindepth 1 -print >&2 || true
                exit 1
              fi
              app_dir="$(find dist/mac-arm64 -maxdepth 1 -type d -name '*.app' -print -quit)"
              payload_dir="${RUNNER_TEMP}/darwin-arm64-payload"
              mkdir -p "$payload_dir"
              cp -PRp "$app_dir" "$payload_dir/Logseq.app"
              if command -v xattr >/dev/null 2>&1; then
                xattr -cr "$payload_dir/Logseq.app"
              fi
              /usr/bin/codesign --force --deep --sign - "$payload_dir/Logseq.app"
              /usr/bin/codesign --verify --deep --strict "$payload_dir/Logseq.app"
              tarball="out/logseq-darwin-arm64-${version}.tar.gz"
              COPYFILE_DISABLE=1 tar -C "$payload_dir" -czf "$tarball" .
              src_dir="$payload_dir"
              hash_file="out/hash-darwin-arm64.txt"
              ;;
            *)
              echo "Unsupported build matrix entry: ${{ matrix.os }}:${{ matrix.arch }}" >&2
              exit 1
              ;;
          esac
          printf '%s\n' "$version" >out/VERSION
          hash=$(nix hash path --type sha256 --sri "$src_dir")
          printf '%s\n' "$hash" >"$hash_file"

      - name: Write build metadata
        if: matrix.arch == 'x64'
        working-directory: logseq-src/static
        run: |
          set -euo pipefail
          {
            echo "version=${{ steps.version.outputs.value }}"
            echo "revision=${{ steps.revision.outputs.rev }}"
            echo "datestring=${{ steps.metadata.outputs.date }}"
          } >out/meta.txt

      - name: Render release notes
        if: matrix.arch == 'x64'
        working-directory: logseq-src
        env:
          LOGSEQ_REV: ${{ steps.revision.outputs.rev }}
          MANIFEST_PATH: ../data/logseq-nightly.json
          OUTPUT_PATH: static/out/release-notes.md
        run: bash ../scripts/render-nightly-release-notes.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.os }}-build-${{ matrix.arch }}
          path: logseq-src/static/out/*
          if-no-files-found: error

  publish-release:
    if: github.event_name == 'schedule' || inputs.publish_release == true
    runs-on: ubuntu-24.04
    needs: build
    concurrency:
      group: repo-main-writer
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Download packaged builds
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh run download "${{ github.run_id }}" --repo "${{ github.repository }}" --dir builds

      - name: Resolve build metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          meta="$(find builds -name meta.txt | head -1)"
          x64_tar="$(find builds -name 'logseq-linux-x64-*.tar.gz' | head -1)"
          arm64_tar="$(find builds -name 'logseq-linux-arm64-*.tar.gz' | head -1)"
          darwin_arm64_tar="$(find builds -name 'logseq-darwin-arm64-*.tar.gz' | head -1)"
          notes="$(find builds -name release-notes.md | head -1)"
          x64_hash_file="$(find builds -name 'hash-x64.txt' | head -1)"
          arm64_hash_file="$(find builds -name 'hash-arm64.txt' | head -1)"
          darwin_arm64_hash_file="$(find builds -name 'hash-darwin-arm64.txt' | head -1)"
          for f in "$meta" "$x64_tar" "$arm64_tar" "$notes" "$x64_hash_file" "$arm64_hash_file"; do
            test -n "$f" || { echo "Required artifact file missing" >&2; exit 1; }
          done
          # meta.txt holds trusted build-step outputs (version/revision/datestring).
          version="$(grep -E '^version=' "$meta" | cut -d= -f2-)"
          revision="$(grep -E '^revision=' "$meta" | cut -d= -f2-)"
          datestring="$(grep -E '^datestring=' "$meta" | cut -d= -f2-)"
          tag="nightly-${datestring}"
          if [ -n "$darwin_arm64_tar" ] || [ -n "$darwin_arm64_hash_file" ]; then
            if [ -z "$darwin_arm64_tar" ] || [ -z "$darwin_arm64_hash_file" ]; then
              echo "Darwin artifact and hash file must either both exist or both be absent" >&2
              exit 1
            fi
            darwin_arm64_asset_url="https://github.com/${REPO}/releases/download/${tag}/$(basename "$darwin_arm64_tar")"
            darwin_arm64_asset_sha256="$(cat "$darwin_arm64_hash_file")"
          else
            echo "Darwin arm64 artifact missing; preserving existing manifest asset." >&2
            darwin_arm64_asset_url="$(jq -r '.assets["aarch64-darwin"].url' data/logseq-nightly.json)"
            darwin_arm64_asset_sha256="$(jq -r '.assets["aarch64-darwin"].sha256' data/logseq-nightly.json)"
            preserved_release_prefix="https://github.com/${REPO}/releases/download/"
            preserved_path="${darwin_arm64_asset_url#"$preserved_release_prefix"}"
            if [ "$preserved_path" != "$darwin_arm64_asset_url" ]; then
              preserved_tag="${preserved_path%%/*}"
              preserved_asset="${preserved_path#*/}"
              preserved_asset="${preserved_asset//%2B/+}"
              preserved_asset="${preserved_asset//%2b/+}"
              if [ "$preserved_tag" = "$tag" ]; then
                echo "Preserved Darwin arm64 asset is on ${tag}; downloading it for re-upload." >&2
                preserved_dir="builds/preserved-darwin-arm64"
                mkdir -p "$preserved_dir"
                gh release download "$tag" --repo "$REPO" --pattern "$preserved_asset" --dir "$preserved_dir"
                darwin_arm64_tar="$(find "$preserved_dir" -maxdepth 1 -name 'logseq-darwin-arm64-*.tar.gz' | head -1)"
                test -n "$darwin_arm64_tar" || {
                  echo "Could not download preserved Darwin arm64 asset for ${tag}" >&2
                  exit 1
                }
              fi
            fi
          fi
          if [ -z "$darwin_arm64_asset_url" ] || [ "$darwin_arm64_asset_url" = "null" ] ||
             [ -z "$darwin_arm64_asset_sha256" ] || [ "$darwin_arm64_asset_sha256" = "null" ]; then
            echo "Existing manifest is missing aarch64-darwin asset data" >&2
            exit 1
          fi
          {
            echo "LOGSEQ_VERSION=${version}"
            echo "LOGSEQ_REV=${revision}"
            echo "NIGHTLY_TAG=${tag}"
            echo "RELEASE_TAG=${tag}"
            echo "BUILD_REVISION=${revision}"
            echo "X64_TARBALL=${x64_tar}"
            echo "ARM64_TARBALL=${arm64_tar}"
            echo "DARWIN_ARM64_TARBALL=${darwin_arm64_tar}"
            echo "RELEASE_NOTES=${notes}"
            echo "ASSET_URL_X86_64=https://github.com/${REPO}/releases/download/${tag}/$(basename "$x64_tar")"
            echo "ASSET_SHA256_X86_64=$(cat "$x64_hash_file")"
            echo "ASSET_URL_AARCH64=https://github.com/${REPO}/releases/download/${tag}/$(basename "$arm64_tar")"
            echo "ASSET_SHA256_AARCH64=$(cat "$arm64_hash_file")"
            echo "ASSET_URL_AARCH64_DARWIN=${darwin_arm64_asset_url}"
            echo "ASSET_SHA256_AARCH64_DARWIN=${darwin_arm64_asset_sha256}"
          } >>"$GITHUB_ENV"

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: nix-logseq-git-flake
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          rev_short="${BUILD_REVISION:0:7}"
          release_assets=("$X64_TARBALL" "$ARM64_TARBALL")
          if [ -n "${DARWIN_ARM64_TARBALL:-}" ]; then
            release_assets+=("$DARWIN_ARM64_TARBALL")
          fi
          gh release delete "$RELEASE_TAG" -y || true
          gh release create "$RELEASE_TAG" "${release_assets[@]}" \
            --title "logseq-nightly-${rev_short}" \
            --notes-file "$RELEASE_NOTES" \
            --target main

      - name: Update nightly manifest and CLI hashes
        run: bash scripts/update-nightly.sh

      # Realize the architecture-independent CLI FODs with their freshly
      # resolved hashes so Cachix uploads them; the aarch64 build substitutes
      # these instead of running nbb's resolver, which fails on arm64.
      - name: Seed CLI fixed-output derivations to Cachix
        run: |
          nix build --accept-flake-config --print-build-logs \
            .#logseq-cli.cliVendor \
            .#logseq-cli.cliPnpmDeps

      - name: Configure git
        run: |
          git config user.name "logseq-nightly-bot"
          git config user.email "actions@users.noreply.github.com"

      - name: Format repository
        run: nix fmt

      - name: Validate flake
        run: |
          nix flake check

      - name: Commit nightly update
        run: |
          if ! git diff --quiet -- data/logseq-nightly.json; then
            git add data/logseq-nightly.json
            git commit -m "chore: bump nightly manifest"
            git push
          else
            echo "Manifest unchanged"
          fi

  report-failure:
    if: ${{ always() && github.event_name == 'schedule' && (needs.build.result != 'success' || needs['publish-release'].result != 'success') }}
    needs:
      - build
      - publish-release
    runs-on: ubuntu-24.04
    steps:
      - name: Create or update failure issue
        uses: actions/github-script@v9
        env:
          ISSUE_TITLE: Nightly build automation failing
          ISSUE_MARKER: <!-- nightly-build-failure -->
          FAILURE_LABELS: type(bug),area(ci),area(automation),area(nightly),status(needs-manual-review),priority(p2),origin(automated)
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BUILD_RESULT: ${{ needs.build.result }}
          PUBLISH_RESULT: ${{ needs['publish-release'].result }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = process.env.ISSUE_TITLE;
            const marker = process.env.ISSUE_MARKER;
            const failureLabels = process.env.FAILURE_LABELS.split(",").filter(Boolean);
            const runUrl = process.env.RUN_URL;
            const buildResult = process.env.BUILD_RESULT;
            const publishResult = process.env.PUBLISH_RESULT;
            const timestamp = new Date().toISOString();

            const body = [
              marker,
              "Nightly build workflow failed on a scheduled run.",
              "",
              `Latest failed run: ${runUrl}`,
              "",
              "This is a rolling issue; new failures are added as comments."
            ].join("\n");

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100
            });

            const existing = openIssues.find(
              (issue) =>
                !issue.pull_request &&
                issue.title === title &&
                issue.body &&
                issue.body.includes(marker)
            );

            const commentBody = [
              `Failure detected at ${timestamp}.`,
              `Run: ${runUrl}`,
              `build=${buildResult}, publish-release=${publishResult}`
            ].join("\n");

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: commentBody
              });
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: existing.number,
                labels: failureLabels
              });
              core.info(`Updated existing issue #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: failureLabels
              });
              core.info(`Created issue #${created.data.number}`);
            }

  report-recovery:
    if: ${{ always() && github.event_name == 'schedule' && needs.build.result == 'success' && needs['publish-release'].result == 'success' }}
    needs:
      - build
      - publish-release
    runs-on: ubuntu-24.04
    steps:
      - name: Close failure issue after recovery
        uses: actions/github-script@v9
        env:
          ISSUE_TITLE: Nightly build automation failing
          ISSUE_MARKER: <!-- nightly-build-failure -->
          RECOVERED_LABEL: status(recovered)
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = process.env.ISSUE_TITLE;
            const marker = process.env.ISSUE_MARKER;
            const recoveredLabel = process.env.RECOVERED_LABEL;
            const runUrl = process.env.RUN_URL;
            const timestamp = new Date().toISOString();

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100
            });

            const existing = openIssues.find(
              (issue) =>
                !issue.pull_request &&
                issue.title === title &&
                issue.body &&
                issue.body.includes(marker)
            );

            if (!existing) {
              core.info("No open rolling nightly failure issue to close.");
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: existing.number,
              body: [
                `Recovery detected at ${timestamp}.`,
                `Successful run: ${runUrl}`,
                "Closing this rolling failure issue."
              ].join("\n")
            });

            await github.rest.issues.removeLabel({
              owner,
              repo,
              issue_number: existing.number,
              name: "status(needs-manual-review)"
            }).catch((error) => {
              if (error.status !== 404) {
                throw error;
              }
            });

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: existing.number,
              labels: [recoveredLabel]
            });

            await github.rest.issues.update({
              owner,
              repo,
              issue_number: existing.number,
              state: "closed"
            });
            core.info(`Closed issue #${existing.number}`);
